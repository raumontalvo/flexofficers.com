    <use href="#shield-inner" fill="url(#field)"/>
    <use href="#shield-inner" fill="none" stroke="url(#blue-glow)" stroke-width="2.2"/>
    <use href="#shield-outer" fill="none" stroke="url(#chrome-edge)" stroke-width="1.2" opacity="0.85"/>

    <g fill="url(#star-metal)">
