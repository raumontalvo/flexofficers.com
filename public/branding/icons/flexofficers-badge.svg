        d="M92 124 92 184 100 176 100 142 126 142 139 129 127 119 100 119 100 124Z"
      />
      <path fill="#ffffff" opacity="0.22" d="M80 100 124 96 132 102 86 106Z"/>
      <path fill="#0ea5e9" opacity="0.18" d="M94 128 132 124 136 130 98 134Z"/>
