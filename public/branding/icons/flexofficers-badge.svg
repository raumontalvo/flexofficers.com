    </filter>
    <path id="shield-outer" d="M100 8 115 14 128 22 142 32 156 52 170 82 176 112 174 142 164 172 148 196 128 212 100 222 72 212 52 196 36 172 26 142 24 112 30 82 44 52 58 32 72 22 85 14Z"/>
    <path id="shield-inner" d="M100 20 112 24 123 31 134 40 145 56 154 78 158 104 156 128 149 152 136 172 118 186 100 192 82 186 64 172 51 152 44 128 42 104 46 78 55 56 66 40 77 31 88 24Z"/>
    <path id="star-lg" d="M0 -11 3.2 -3.4 11.4 -3.4 4.1 1.2 6.6 9.2 0 4.6 -6.6 9.2 -4.1 1.2 -11.4 -3.4 -3.2 -3.4Z"/>
    <path id="star-sm" d="M0 -7.5 2.2 -2.3 7.8 -2.3 2.8 0.8 4.5 6.3 0 3.1 -4.5 6.3 -2.8 0.8 -7.8 -2.3 -2.2 -2.3Z"/>
  </defs>
  <g filter="url(#drop)">
