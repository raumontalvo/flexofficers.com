<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 226" role="img" aria-label="FlexOfficers badge">
  <defs>
    <linearGradient id="chrome" x1="18%" y1="6%" x2="82%" y2="94%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="18%" stop-color="#e8edf4"/>
      <stop offset="42%" stop-color="#9aa6b6"/>
      <stop offset="62%" stop-color="#d5dde8"/>
      <stop offset="82%" stop-color="#6f7d90"/>
      <stop offset="100%" stop-color="#4b5568"/>
    </linearGradient>
    <linearGradient id="chrome-edge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="50%" stop-color="#94a3b8"/>
      <stop offset="100%" stop-color="#475569"/>
    </linearGradient>
    <radialGradient id="field" cx="50%" cy="42%" r="62%">
